# Install pyenv https://github.com/pyenv/pyenv?tab=readme-ov-file#linuxunix

pyenv_packages:
  - make
  - build-essential 
  - libssl-dev 
  - zlib1g-dev 
  - libbz2-dev 
  - libreadline-dev 
  - libsqlite3-dev 
  - curl 
  - git 
  - libncursesw5-dev 
  - xz-utils 
  - tk-dev 
  - libxml2-dev 
  - libxmlsec1-dev 
  - libffi-dev 
  - liblzma-dev

pyenv_shell_environment: |
  export PYENV_ROOT="$HOME/.pyenv"
  [[ -d $PYENV_ROOT/bin ]] && export PATH="$PYENV_ROOT/bin:$PATH"
  eval "$(pyenv init - bash)"