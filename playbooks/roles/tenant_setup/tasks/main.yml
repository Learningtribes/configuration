# Installs packages to run edx locally on a single instance
#
---
- name: 'Check required variables'
  assert:
    that: "{{ item }} is defined"
    msg: "define '{{ item }}' before executing this role"
  with_items:
    - TENANT_NAME

- name: Install requirements
  apt:
    name: "{{ item }}"
    state: latest
  with_items:
    - python-mysqldb
    - python-pymongo

- name: Patch to install python3 requirements
  apt:
    name: "{{ item }}"
    state: latest
    install_recommends: no
  with_items:
    - python3-pymysql
    - python3-pymongo
  tags:
    - "triboo_upgrade_patch"
    - "never"

# This is for triboo_upgrade
# Fix root uses auth_socket for AUTH on MySQL
# ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY 'password_string';
- name: Patch to update mysql root
  shell: |
    mysql -e "ALTER USER 'root'@'localhost' IDENTIFIED WITH mysql_native_password BY '{{ TENANT_MYSQL_LOGIN_PASSWORD }}';"
  tags:
    - "triboo_upgrade_patch"
    - "never"
- name: create mysql databases
  mysql_db:
    login_host: "{{ TENANT_MYSQL_LOGIN_HOST }}"
    login_password: "{{ TENANT_MYSQL_LOGIN_PASSWORD }}"
    login_user: "{{ TENANT_MYSQL_LOGIN_USER }}"
    db: "{{ item }}"
    state: present
    encoding: utf8
  when: item != None and item != ''
  with_items: "{{ TENANT_MYSQL_DATABASES }}"
  tags:
    - "triboo_upgrade"

- name: create mysql user
  mysql_user:
    login_host: "{{ TENANT_MYSQL_LOGIN_HOST }}"
    login_password: "{{ TENANT_MYSQL_LOGIN_PASSWORD }}"
    login_user: "{{ TENANT_MYSQL_LOGIN_USER }}"
    host: "%"
    name: "{{ TENANT_MYSQL_USER }}"
    password: "{{ TENANT_MYSQL_PASS }}"
    priv: "{{ item }}.*:ALL"
    append_privs: yes
  with_items: "{{ TENANT_MYSQL_DATABASES }}"
  tags:
    - "triboo_upgrade"

# This is for triboo_upgrade
# The current ansible's community.mongodb does not support pymongo3.* and get error when execute it
# To use mongo shell to create
- name: create mongodb user and databases
  shell: "mongo mongodb://{{ TENANT_MONGO_LOGIN_HOST }}:27017/{{ item }} -u {{ MONGO_ADMIN_USER }} --authenticationDatabase=admin -p {{ MONGO_ADMIN_PASSWORD }} --eval \"db.createUser({ user: '{{ TENANT_MONGO_USER }}', pwd: '{{ TENANT_MONGO_PASS }}', roles: [{ role: 'readWrite', db: '{{ item }}' }] })\""
  with_items: "{{ TENANT_MONGO_DATABASES }}"
  run_once: true
  tags:
    - "triboo_upgrade"

- name: Add vhosts
  rabbitmq_vhost:
    name: "{{ TENANT_RMQ_VHOST }}"
    state: present
  tags:
    - "triboo_upgrade"

- name: Extend permission for admin user
  rabbitmq_user:
    user: "{{ RABBIT_ADMIN_USER }}"
    password: "{{ RABBIT_ADMIN_PASSWORD }}"
    vhost: "{{ TENANT_RMQ_VHOST }}"
    configure_priv: .*
    tags: "administrator"
    read_priv: .*
    write_priv: .*
    state: present
  tags:
    - "triboo_upgrade"


- name: Add rmq user
  rabbitmq_user:
    user: "{{ TENANT_RMQ_USER }}"
    password: "{{ TENANT_RMQ_PASS }}"
    tags: "management"
    permissions:
      - vhost: "{{ TENANT_RMQ_VHOST }}"
        configure_priv: .*
        read_priv: .*
        write_priv: .*
    state: present
  tags:
    - "triboo_upgrade"

